name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  formula-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formula syntax
        run: ruby -c Formula/*.rb

  auto-merge-bump-pr:
    needs: formula-syntax
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'app/tasuku43-homebrew-tap-writer' &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'chore/homebrew-formula-v') &&
      startsWith(github.event.pull_request.title, 'Update Homebrew formula for v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Verify bump PR scope
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          disallowed_files="$(gh pr diff "$PR_URL" --name-only | grep -Ev '^Formula/[^/]+\.rb$' || true)"
          if [ -n "$disallowed_files" ]; then
            echo "Unexpected files changed:"
            echo "$disallowed_files"
            exit 1
          fi

      - name: Merge bump PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --merge --delete-branch
